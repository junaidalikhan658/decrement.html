<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="decrement.css">
</head>
<body>
    <main>
        <section>
        <h2>Increment by 5(Internal JS)</h2>
        <p id="count5">0</p>
        <button id="increase5Btn" class="button">Increase by 5</button>
        </section>
        
        <section>
        <h2>Decrement by 5 (Internal JS)</h2>
        <p id="countFive">0</p>
        <button id="decreaseFiveBtn" class="button">Decrease by 5</button>
        </section>
    </main>
    
    <footer>
        <p>&copy; 2026 My Website | All rights reserved.</p>
    </footer>

<script>
      let count5  = 0;
      const count5Display = document.getElementById("count5");
      const increase5Btn = document.getElementById("increase5Btn");
      increase5Btn.addEventListener("click", function () {
        count5 = count5 + 5;
        count5Display.textContent = count5;
      });

      let countFive = 0;

      const countFiveDisplay = document.getElementById("countFive");
      const decreaseFiveBtn = document.getElementById("decreaseFiveBtn");

      decreaseFiveBtn.addEventListener("click", function () {
        countFive = countFive - 5;
        countFiveDisplay.textContent = countFive;
      });

      
</script>
</body>
</html>
